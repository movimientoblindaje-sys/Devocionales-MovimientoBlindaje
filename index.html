<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movimiento Blindaje - Oseas Premium</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --gold: #FFD700;
            --cyan: #00e5ff;
            --magenta: #ff00ff;
            --text: #ffffff;
            --font: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Fondo con malla tecnológica */
            background-image: 
                linear-gradient(rgba(255, 215, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* LOGO CON RESPLANDOR */
        .header {
            padding: 20px;
            text-align: center;
        }
        .logo-box {
            font-weight: 900;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 5px;
            text-shadow: 0 0 10px var(--gold);
        }

        /* CONTENEDOR PRINCIPAL TIPO "CONSOLA" */
        .main-container {
            width: 92%;
            max-width: 400px;
            margin-top: 10px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Borde Neón Animado */
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 1),
                inset 0 0 15px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        /* Efecto de luz perimetral */
        .player-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, var(--gold), var(--cyan), var(--magenta), var(--gold));
            z-index: -1;
            border-radius: 32px;
            opacity: 0.8;
            filter: blur(2px);
        }

        /* INFO DEL AUDIO */
        .status-badge {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid var(--gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            display: inline-block;
            margin-bottom: 15px;
        }

        h1#titulo-audio {
            font-size: 1.6rem;
            margin: 10px 0;
            background: linear-gradient(to bottom, #fff 60%, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* PLAYER NATIVO ESTILIZADO */
        audio {
            width: 100%;
            height: 40px;
            margin: 20px 0;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
            opacity: 0.9;
        }

        /* BOTONES CON EFECTO DE PROFUNDIDAD */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .btn-main {
            background: linear-gradient(180deg, var(--gold) 0%, #b8860b 100%);
            color: #000;
            box-shadow: 0 5px 0 #7a5a00, 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-main:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #7a5a00;
        }

        .btn-share {
            background: rgba(255, 255, 255, 0.05);
            color: var(--cyan);
            border: 1px solid var(--cyan);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        /* HISTORIAL ESTILO LISTA DE MISIONES */
        .history-section {
            margin-top: 30px;
            padding-bottom: 50px;
        }

        .history-title {
            color: var(--magenta);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-mini {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-box">MOVIMIENTO BLINDAJE</div>
    </div>

    <div class="main-container">
        <div class="player-card">
            <div style="text-align: center;">
                <span class="status-badge" id="dia-texto">CARGANDO SISTEMA</span>
                <h1 id="titulo-audio">Oseas 1:1</h1>
                <p style="color: #888; font-size: 0.8rem;">ESTUDIO DIARIO AUDIOVISUAL</p>
            </div>

            <audio id="main-player" controls><source src="" type="audio/mpeg"></audio>

            <button class="btn btn-main" onclick="document.getElementById('main-player').play()">
                ▶ INICIAR ESTUDIO
            </button>
            <button class="btn btn-share" onclick="compartirAudio()">
                Compartir con la comunidad
            </button>
        </div>

        <div class="history-section" id="seccion-historial" style="display:none;">
            <div class="history-title">
                <div style="width: 10px; height: 10px; background: var(--magenta); border-radius: 50%;"></div>
                Sesiones Anteriores
            </div>
            <div id="lista-historial"></div>
        </div>
    </div>

    <script>
        const listaAudios = [
            { titulo: "Oseas 1:1-2", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-1-1-al-2.mp3" },
            { titulo: "Oseas 1:3-9", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-1-3-al-9.mp3" },
            { titulo: "Oseas 1:10-11", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-1-10-al-11.mp3" },
            { titulo: "Oseas 2:1-13", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-2-1-al-13.mp3" },
            { titulo: "Oseas 2:14-23", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-2-14-al-23.mp3" },
            { titulo: "Oseas 3:1-5", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-3-1-al-5.mp3" },
            { titulo: "Oseas 4:1-5", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-4-1-al-5.mp3" },
            { titulo: "Oseas 4:6-12", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-4-6-al-12.mp3" },
            { titulo: "Oseas 4:13-19", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-4-13-al-19.mp3" },
            { titulo: "Oseas 5:1-5", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-5-1-al-5.mp3" },
            { titulo: "Oseas 5:6-9", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-5-6-al-9.mp3" },
            { titulo: "Oseas 5:10-15", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-5-10-al-15.mp3" },
            { titulo: "Oseas 6:1-3", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-6-1-al-3.mp3" },
            { titulo: "Oseas 6:4-6", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-6-4-al-6.mp3" },
            { titulo: "Oseas 6:7-11", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-6-7-al-11.mp3" },
            { titulo: "Oseas 7:1-6", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-7-1-al-6.mp3" },
            { titulo: "Oseas 7:7-12", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-7-7-al-12.mp3" },
            { titulo: "Oseas 7:13-16", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-7-13-al-16.mp3" },
            { titulo: "Oseas 8:1-4", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-8-1-al-4.mp3" },
            { titulo: "Oseas 8:5-9", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-8-5-al-9.mp3" },
            { titulo: "Oseas 8:10-14", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-8-10-al-14.mp3" },
            { titulo: "Oseas 9:1-4", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-9-1-al-4.mp3" },
            { titulo: "Oseas 9:5-9", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-9-5-al-9.mp3" },
            { titulo: "Oseas 9:10-17", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-9-10-al-17.mp3" },
            { titulo: "Oseas 10:1-5", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-10-1-al-5.mp3" },
            { titulo: "Oseas 10:6-10", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-10-6-al-10.mp3" },
            { titulo: "Oseas 10:11-15", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-10-11-al-15.mp3" },
            { titulo: "Oseas 11:1-6", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-11-1-al-6.mp3" },
            { titulo: "Oseas 11:7-12", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-11-7-al-12.mp3" },
            { titulo: "Oseas 12:1-6", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-12-1-al-6.mp3" },
            { titulo: "Oseas 12:7-14", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-12-7-al-14.mp3" },
            { titulo: "Oseas 13:1-6", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-13-1-al-6.mp3" },
            { titulo: "Oseas 13:7-11", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-13-7-al-11.mp3" },
            { titulo: "Oseas 13:12-16", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-13-12-al-16.mp3" },
            { titulo: "Oseas 14:1-4", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-14-1-al-4.mp3" },
            { titulo: "Oseas 14:5-9", url: "https://archive.org/download/oseas/Libro%20de%20Oseas/Libro-de-Oseas-14-5-al-9.mp3" }
        ];

        function inicializar() {
            const inicio = new Date("2026-04-06T00:00:00");
            const hoy = new Date();
            const diaSemana = hoy.getDay();

            if (diaSemana === 0 || diaSemana === 6) {
                document.getElementById('titulo-audio').innerText = "TIEMPO DE REPOSO";
                document.getElementById('dia-texto').innerText = "SÁB/DOM";
                document.querySelector('.btn-main').style.display = "none";
                document.getElementById('main-player').style.display = "none";
                cargarHistorialFinDeSemana();
                return;
            }

            let diff = Math.floor((hoy - inicio) / (1000 * 60 * 60 * 24));
            let semanas = Math.floor(diff / 7);
            let index = diff - (semanas * 2);

            if (index >= 0 && index < listaAudios.length) {
                const actual = listaAudios[index];
                document.getElementById('titulo-audio').innerText = actual.titulo;
                document.getElementById('dia-texto').innerText = "ESTUDIO DISPONIBLE";
                document.getElementById('main-player').src = actual.url;
                cargarHistorial(index);
            }
        }

        function cargarHistorial(actual) {
            if (actual === 0) return;
            document.getElementById('seccion-historial').style.display = "block";
            const lista = document.getElementById('lista-historial');
            for(let i=0; i < actual; i++) {
                lista.innerHTML += `<div class="history-item">
                    <span>${listaAudios[i].titulo}</span>
                    <button class="btn-mini" onclick="reproducir('${listaAudios[i].url}', '${listaAudios[i].titulo}')">OÍR</button>
                </div>`;
            }
        }

        function cargarHistorialFinDeSemana() {
            // Similar a la anterior pero determina el último viernes
            document.getElementById('seccion-historial').style.display = "block";
            // Lógica para mostrar los acumulados hasta el viernes pasado
        }

        function reproducir(url, tit) {
            const p = document.getElementById('main-player');
            p.style.display = "block";
            document.querySelector('.btn-main').style.display = "flex";
            p.src = url;
            document.getElementById('titulo-audio').innerText = tit;
            p.play();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function compartirAudio() {
            const url = document.getElementById('main-player').src;
            if (navigator.share) {
                navigator.share({ title: 'Movimiento Blindaje', text: 'Escucha el estudio de hoy', url: url });
            }
        }

        window.onload = inicializar;
    </script>
</body>
</html>
