<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimiento Blindaje - Reproductor Diario</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --primary-color: #2563eb;
            --gray-light: #f3f4f6;
            --gray-md: #e5e7eb;
            --gray-text: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Encabezado */
        header {
            text-align: center;
            padding: 10px 0;
            border-bottom: 2px solid var(--text-color);
        }

        header h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Info del Día */
        .day-badge {
            background-color: var(--gray-light);
            border: 2px solid var(--text-color);
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 4px;
        }

        /* Reproductor Principal */
        .player-card {
            border: 3px solid var(--text-color);
            padding: 20px;
            border-radius: 8px;
            background: white;
            box-shadow: 4px 4px 0px 0px var(--text-color);
        }

        .track-info {
            text-align: center;
            margin-bottom: 15px;
        }

        .track-info h2 {
            font-size: 1.3rem;
            margin-bottom: 4px;
            color: var(--text-color);
        }

        .track-info p {
            font-size: 0.9rem;
            color: var(--gray-text);
        }

        /* Barra de Progreso */
        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 20px;
        }

        .seek-bar {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--gray-md);
            border: 2px solid var(--text-color);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--text-color);
            cursor: pointer;
            border-radius: 50%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .btn {
            background: white;
            border: 2px solid var(--text-color);
            padding: 10px 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px;
            box-shadow: 2px 2px 0px 0px var(--text-color);
            transition: all 0.1s ease;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--text-color);
        }

        .btn-main {
            padding: 14px 24px;
            font-size: 1.1rem;
            background: var(--text-color);
            color: white;
            box-shadow: 2px 2px 0px 0px #666;
        }

        .btn-main i {
            stroke: white;
        }

        /* Listas de Módulos (Mañana, Tarde, Noche) */
        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            border-left: 4px solid var(--text-color);
            padding-left: 8px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .module-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 2px solid var(--text-color);
            border-radius: 4px;
            cursor: pointer;
            background: var(--gray-light);
            font-weight: 500;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background: var(--gray-md);
        }

        .playlist-item.active {
            background: #dbeafe;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .playlist-item i {
            width: 18px;
            height: 18px;
        }

        .share-container {
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Movimiento Blindaje</h1>
        </header>

        <div class="day-badge" id="devotion-day-info">
            Cargando día del devocional...
        </div>

        <!-- Reproductor Principal -->
        <div class="player-card">
            <div class="track-info">
                <p style="text-transform: uppercase; font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; color: var(--primary-color);">Escuchando ahora</p>
                <h2 id="track-name">Selecciona un audio</h2>
                <p id="track-module">Módulo</p>
            </div>

            <div class="progress-container">
                <input type="range" class="seek-bar" id="seek-bar" value="0" min="0" max="100">
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="total-duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-main" id="play-pause-btn">
                    <i id="play-icon" data-lucide="play"></i>
                    <i id="pause-icon" data-lucide="pause" style="display: none;"></i>
                    <span id="btn-text">Reproducir</span>
                </button>
            </div>
        </div>

        <!-- Bloque de Audios del Día -->
        <div>
            <div class="section-title">Audios de Hoy</div>
            <div class="module-list" id="daily-list">
                <!-- Se generan dinámicamente -->
            </div>
        </div>

        <!-- Botón para Compartir -->
        <div class="share-container">
            <button class="btn" id="share-audio-btn">
                <i data-lucide="share-2"></i> Compartir audio de hoy
            </button>
        </div>

        <!-- Historial / Archivo Completo -->

            <div class="section-title">Archivo de Salmos (Anteriores)</div>
            <div class="module-list" id="archive-list">

        let audio = new Audio(), currentIdx = 0, isPlaying = false, currentDayStart = 0;

              playIcon = document.getElementById('play-icon'),
              pauseIcon = document.getElementById('pause-icon'),
              btnText = document.getElementById('btn-text'),
              seekBar = document.getElementById('seek-bar'),
              currentTimeEl = document.getElementById('current-time'),
              totalDurationEl = document.getElementById('total-duration'),

              archiveList = document.getElementById('archive-list'),

              dayInfo = document.getElementById('devotion-day-info');

        // FUNCIÓN CORREGIDA: Ahora es 100% tolerante a variaciones de tipeo en las URLs
        function getCleanName(url) {
            const fileName = decodeURIComponent(url).split('/').pop().replace('.mp3', '');
            
            // Expresión regular que ignora mayúsculas/minúsculas y variaciones tipográficas
            const matchRange = fileName.match(/salmos-(\d+)-(\d+)-(?:al|a|y)-+?(\d+)/i);
            if (matchRange) return `SALMOS ${matchRange[1]}:${matchRange[2]}-${matchRange[3]}`;
            
            const matchSingle = fileName.match(/salmos-(\d+)/i);
            if (matchSingle) return `SALMOS CAPÍTULO ${matchSingle[1]}`;
            
            return fileName.replace(/-/g, ' ')
                           .replace(/(libro|de|salmos|llbro|libro)/gi, '')
                           .trim()
                           .toUpperCase();
        }

        function getModuleLabel(index) {
            const modules = ["Desayuno", "Almuerzo", "Cena"];
            return modules[index % 3];
        }

        function calculateDevotionalDay() {
            // Fecha base de inicio del proyecto (Ajustable)
            const startDate = new Date("2026-06-01");
            const today = new Date();
            
            let totalDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            if (totalDays < 0) totalDays = 0;

            // Lógica de saltarse fines de semana (Lunes a Viernes únicamente)
            let businessDays = 0;
            for (let i = 0; i <= totalDays; i++) {
                let currentCheck = new Date(startDate.getTime() + (i * 24 * 60 * 60 * 1000));
                let dayOfWeek = currentCheck.getDay();
                if (dayOfWeek !== 0 && dayOfWeek !== 6) { // Evitar Sábado (6) y Domingo (0)
                    businessDays++;
                }
            }

            dayInfo.textContent = `Día del Devocional: #${businessDays === 0 ? 1 : businessDays}`;
            
            // Cada día hábil consume exactamente 3 módulos (audios) del índice de enlaces
            currentDayStart = Math.max(0, (businessDays - 1) * 3);
            if (currentDayStart >= URLS.length) currentDayStart = 0; 
        }

        function loadTrack(index) {
            if (index < 0 || index >= URLS.length) return;
            currentIdx = index;
            audio.src = URLS[currentIdx];
            trackName.textContent = getCleanName(URLS[currentIdx]);
            trackModule.textContent = `Módulo: ${getModuleLabel(currentIdx)}`;
            
            // Reset de barra de progreso
            seekBar.value = 0;
            currentTimeEl.textContent = "0:00";
            totalDurationEl.textContent = "0:00";

            // Resaltar elemento activo en las listas visuales
            document.querySelectorAll('.playlist-item').forEach(item => {
                item.classList.remove('active');
                let playIconInner = item.querySelector('.play-item-icon');
                if (playIconInner) playIconInner.setAttribute('data-lucide', 'play');
            });

            const activeItem = document.querySelector(`[data-index="${currentIdx}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
                let playIconInner = activeItem.querySelector('.play-item-icon');
                if (playIconInner && isPlaying) playIconInner.setAttribute('data-lucide', 'pause');
            }
            lucide.createIcons();
        }

        function togglePlay() {
            if (audio.src === "" && URLS.length > 0) {
                loadTrack(currentDayStart);
            }

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.style.display = "inline";
                pauseIcon.style.display = "none";
                btnText.textContent = "Reproducir";
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    playIcon.style.display = "none";
                    pauseIcon.style.display = "inline";
                    btnText.textContent = "Pausar";
                    loadTrack(currentIdx); // Refresca iconos de lista activa
                }).catch(err => {
                    console.error("Error al reproducir el archivo de Archive.org: ", err);
                });
            }
        }

        // Renderizar dinámicamente las listas
        function renderPlaylists() {
            dailyList.innerHTML = "";
            archiveList.innerHTML = "";

            URLS.forEach((url, index) => {
                const item = document.createElement('div');
                item.className = "playlist-item";
                item.setAttribute('data-index', index);
                item.innerHTML = `
                    <div>
                        <div style="font-size:0.85rem; font-weight:bold; color:var(--gray-text); text-transform:uppercase;">${getModuleLabel(index)}</div>
                        <div>${getCleanName(url)}</div>
                    </div>
                    <i class="play-item-icon" data-lucide="play"></i>
                `;

                item.addEventListener('click', () => {
                    if (currentIdx === index && isPlaying) {
                        togglePlay();
                    } else {
                        isPlaying = false; // Forzar reinicio de estado para el nuevo track
                        loadTrack(index);
                        togglePlay();
                    }
                });

                // Si está dentro de los 3 audios que corresponden a hoy, va arriba. Si no, al archivo.
                if (index >= currentDayStart && index < currentDayStart + 3) {
                    dailyList.appendChild(item);
                } else {
                    archiveList.appendChild(item);
                }
            });

            lucide.createIcons();
        }

        // Eventos del Reproductor nativo de Audio
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const value = (audio.currentTime / audio.duration) * 100;
                seekBar.value = value;
                
                // Formatear minutos y segundos actualizados
                let curMins = Math.floor(audio.currentTime / 60);
                let curSecs = Math.floor(audio.currentTime % 60);
                if (curSecs < 10) curSecs = `0${curSecs}`;
                currentTimeEl.textContent = `${curMins}:${curSecs}`;
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            let durMins = Math.floor(audio.duration / 60);
            let durSecs = Math.floor(audio.duration % 60);
            if (durSecs < 10) durSecs = `0${durSecs}`;
            totalDurationEl.textContent = `${durMins}:${durSecs}`;
        });

        seekBar.addEventListener('input', () => {
            if (audio.duration) {
                audio.currentTime = (seekBar.value / 100) * audio.duration;
            }
        });

        audio.addEventListener('ended', () => {
            // Al terminar avanza automáticamente al siguiente módulo del día
            if (currentIdx < URLS.length - 1) {
                loadTrack(currentIdx + 1);
                audio.play();
            } else {
                isPlaying = false;
                playIcon.style.display = "inline";
                pauseIcon.style.display = "none";
                btnText.textContent = "Reproducir";
            }
        });

        playPauseBtn.addEventListener('click', togglePlay);

        // Compartir Enlace del Audio Actual por WhatsApp/Nativo móvil
        shareBtn.addEventListener('click', () => {
            const shareText = `Escucha el audio de hoy de Movimiento Blindaje: ${getCleanName(URLS[currentIdx])} -> ${URLS[currentIdx]}`;
            if (navigator.share) {
                navigator.share({
                    title: 'Movimiento Blindaje',
                    text: shareText,
                    url: window.location.href
                }).catch(console.error);
            } else {
                // Alternativa rápida si no está en dispositivo móvil compatible
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`, '_blank');
            }
        });

        // Inicialización al cargar la web
        calculateDevotionalDay();
        renderPlaylists();
        loadTrack(currentDayStart); // Precarga el primer audio de la mañana de hoy automáticamente

    </script>
</body>
</html>
