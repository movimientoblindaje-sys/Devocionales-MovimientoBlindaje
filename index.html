<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimiento Blindaje - Especial Semana Santa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap');
        :root { --accent: #ffc61a; --bg: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--accent); background: radial-gradient(circle at center, #ffdb4d 0%, #ffc61a 100%); }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { border: 2px solid rgba(255, 198, 26, 0.5); box-shadow: 0 0 20px rgba(0, 0, 0, 0.4); }
        .futuristic-title { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        video { border-radius: 1.5rem; width: 100%; aspect-ratio: 16/9; background: #000; outline: none; }
        /* Estilo para el botón de compartir */
        .btn-action { transition: all 0.3s ease; }
        .btn-action:hover { background-color: var(--accent); color: black; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex flex-col items-center">

    <header class="text-center mb-8">
        <img id="logo-img" src="logo-blindaje.png" alt="Logo" class="mx-auto max-h-40 mb-4 drop-shadow-[0_10px_20px_rgba(0,0,0,0.4)]">
        <h1 class="text-3xl md:text-5xl font-black text-black futuristic-title uppercase mb-1">Especial</h1>
        <h2 class="text-xl md:text-2xl font-bold text-black opacity-80 uppercase tracking-widest">Semana Santa</h2>
    </header>

    <main class="w-full max-w-3xl">
        <section class="glass neon-border rounded-[2.5rem] p-4 md:p-8 text-white relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10 text-4xl font-black italic text-yellow-500">MB</div>
            
            <div class="text-center mb-6">
                <div id="video-day-label" class="inline-block bg-yellow-500 text-black px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-2 shadow-lg">
                    Cargando...
                </div>
                <h3 id="video-title" class="text-2xl md:text-3xl font-black text-white leading-tight">Reflexión</h3>
            </div>

            <div class="relative group rounded-[1.5rem] overflow-hidden bg-black shadow-2xl">
                <video id="main-video" controls playsinline poster="logo-blindaje.png">
                    <source id="video-source" src="" type="video/mp4">
                    Tu navegador no soporta la reproducción de video.
                </video>
            </div>

            <div class="mt-8 space-y-4">
                <button id="share-btn" class="btn-action w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl">
                    Compartir Especial de Hoy
                </button>
                <div class="flex justify-center items-center gap-2 opacity-50">
                    <span class="h-[1px] w-8 bg-gray-500"></span>
                    <p class="text-[9px] font-bold uppercase tracking-[0.3em]">Movimiento Blindaje • 720p HD</p>
                    <span class="h-[1px] w-8 bg-gray-500"></span>
                </div>
            </div>
        </section>
    </main>

    <script>
        const videoElement = document.getElementById('main-video');
        const videoSource = document.getElementById('video-source');
        const videoTitle = document.getElementById('video-title');
        const dayLabel = document.getElementById('video-day-label');
        const shareBtn = document.getElementById('share-btn');

        // ENLACES DE ARCHIVE.ORG PROPORCIONADOS
        const SPECIAL_CONTENT = {
            5: { // Viernes
                title: "Crucifixión y Entrega",
                url: "https://ia600903.us.archive.org/21/items/viernes_202604/viernes.mp4",
                label: "Viernes Santo"
            },
            6: { // Sábado
                title: "Silencio y Esperanza",
                url: "https://ia601903.us.archive.org/16/items/sabado_202604/sabado.mp4",
                label: "Sábado de Gloria"
            },
            0: { // Domingo
                title: "Victoria y Resurrección",
                url: "https://ia800608.us.archive.org/18/items/domingo_202604/domingo.mp4",
                label: "Domingo de Resurrección"
            }
        };

        function loadVideo() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            
            // Lógica para detectar si hay un parámetro 'day' en la URL (para compartir videos específicos)
            const params = new URLSearchParams(window.location.search);
            const dayParam = params.get('day');
            
            const selectedDay = (dayParam !== null && SPECIAL_CONTENT[dayParam]) ? parseInt(dayParam) : dayOfWeek;
            const content = SPECIAL_CONTENT[selectedDay];

            if (content) {
                videoSource.src = content.url;
                videoTitle.textContent = content.title;
                dayLabel.textContent = content.label;
                videoElement.load();
            } else {
                // Caso por defecto si no es fin de semana o no hay parámetro
                const viernes = SPECIAL_CONTENT[5];
                videoSource.src = viernes.url;
                videoTitle.textContent = viernes.title;
                dayLabel.textContent = "Especial Semana Santa";
                videoElement.load();
            }
        }

        shareBtn.onclick = () => {
            const params = new URLSearchParams(window.location.search);
            const dayParam = params.get('day');
            const now = new Date();
            const currentDay = dayParam !== null ? dayParam : now.getDay();
            
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}?day=${currentDay}`;
            
            if (navigator.share) {
                navigator.share({ 
                    title: 'Movimiento Blindaje - Especial', 
                    text: `Mira el video de hoy: ${videoTitle.textContent}`,
                    url: shareUrl 
                });
            } else {
                navigator.clipboard.writeText(shareUrl);
                alert("¡Enlace del video copiado!");
            }
        };

        window.onload = loadVideo;
    </script>
</body>
</html>
